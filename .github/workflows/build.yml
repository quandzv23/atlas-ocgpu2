name: Build A21s Kernel (Fix ccache)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libncurses-dev curl git

    - name: Install clang
      run: |
        git clone --depth=1 https://github.com/llvm/llvm-project clang
        echo "$PWD/clang/bin" >> $GITHUB_PATH

    - name: Fix missing ccache (IMPORTANT)
      run: |
        mkdir -p fakebin
        ln -s $(which gcc) fakebin/ccache
        echo "$PWD/fakebin" >> $GITHUB_PATH

    - name: Set env
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV

    - name: Build kernel
      run: |
        make exynos_defconfig
        make -j$(nproc)

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: |
          arch/arm64/boot/Image.gz
          arch/arm64/boot/dts/**/*.dtb
