name: Build A21s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget file \
            bc bison flex zip unzip \
            libssl-dev make \
            libc6-dev libncurses5-dev libelf-dev \
            gcc g++ \
            clang lld llvm \
            python3 python2 binutils patch

      - name: Fix ccache
        run: |
          sudo mkdir -p /usr/local/bin
          printf '#!/bin/bash\nexec "$@"\n' | sudo tee /usr/local/bin/ccache
          sudo chmod +x /usr/local/bin/ccache
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          rm -rf kernel
          git clone --depth=1 \
            https://github.com/samsungexynos850/atlas \
            kernel

      - name: Setup KernelSU-Next
        run: |
          cd kernel
          rm -rf KernelSU drivers/kernelsu drivers/ksu

          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s stable

          KSU_DIR=$(find -L drivers -type d \( -name "kernelsu" -o -name "ksu" \) | head -n 1)
          [ -z "$KSU_DIR" ] && KSU_DIR="KernelSU/kernel"
          echo "Using KSU_DIR=$KSU_DIR"

          sed -i '/MODULE_IMPORT_NS/d' "$KSU_DIR/core/init.c" || true

          echo "[+] KernelSU-Next setup done"

      # ────────────────────────────────────────────────────────
      # FIX: Patch KernelSU-Next file_wrapper.c cho Samsung 4.14
      # ────────────────────────────────────────────────────────
      - name: Patch KernelSU-Next file_wrapper.c
        run: |
          cd kernel

          FILE_WRAPPER="drivers/kernelsu/infra/file_wrapper.c"
          if [ ! -f "$FILE_WRAPPER" ]; then
            echo "[!] file_wrapper.c not found, searching..."
            FILE_WRAPPER=$(find drivers/kernelsu -name file_wrapper.c | head -n 1)
          fi

          if [ -f "$FILE_WRAPPER" ]; then
            echo "[+] Patching $FILE_WRAPPER for Samsung 4.14..."
            
            # Xóa/comment dòng chứa iopoll, remap_file_range, REMAP_FILE_DEDUP
            sed -i '/\.iopoll\s*=/d' "$FILE_WRAPPER" || true
            sed -i '/iopoll,/d' "$FILE_WRAPPER" || true
            sed -i 's/\(.*iopoll.*\)/\/\/ \1/g' "$FILE_WRAPPER" || true
            
            sed -i '/\.remap_file_range\s*=/d' "$FILE_WRAPPER" || true
            sed -i '/remap_file_range,/d' "$FILE_WRAPPER" || true
            sed -i 's/\(.*remap_file_range.*\)/\/\/ \1/g' "$FILE_WRAPPER" || true
            
            sed -i 's/REMAP_FILE_DEDUP/0/g' "$FILE_WRAPPER" || true
            
            echo "[+] file_wrapper.c patched"
          fi

      - name: GPU Overclock Mali-G52 1196MHz
        run: |
          cd kernel

          echo "[*] Searching for GPU DVFS tables..."
          GPU_TABLE=$(grep -rl "gpu_dvfs_table\|gpu_max_clock\|GPU_MAX_CLOCK" \
            drivers/gpu/ arch/ --include="*.c" --include="*.h" 2>/dev/null | head -n 5)

          for f in $GPU_TABLE; do
            if grep -q "949000\|949\b" "$f" 2>/dev/null; then
              sed -i '/949000/{h;s/949000/1196000/;H;x;}' "$f" || true
              echo "[+] Added 1196000 kHz entry in $f"
            fi
          done

          GPU_PLATFORM=$(find drivers/gpu -name "*.c" | \
            xargs grep -l "gpu_max_clock\|exynos.*gpu.*freq\|mali.*exynos" 2>/dev/null | head -n 1)

          if [ -n "$GPU_PLATFORM" ]; then
            sed -i 's/\.gpu_max_clock\s*=\s*[0-9]*/\.gpu_max_clock = 1196/' "$GPU_PLATFORM" || true
          fi

      - name: Fix scripts
        run: |
          cd kernel
          chmod +x scripts/config || true
          printf '#!/bin/sh\nexit 0\n' > scripts/min-tool-version.sh
          chmod +x scripts/min-tool-version.sh

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Gemini"
          export KBUILD_BUILD_HOST="Github-Actions"

          make exynos850-a21snsxx_defconfig

          ./scripts/config --enable  KSU              || true
          ./scripts/config --enable  KPROBES          || true
          ./scripts/config --enable  OVERLAY_FS       || true
          ./scripts/config --enable  KPROBE_EVENTS    || true
          ./scripts/config --disable LTO              || true
          ./scripts/config --disable CFI_CLANG        || true

          yes "" | make olddefconfig

          make -j$(nproc) \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            2>&1 | tee ../build.log

      - name: Debug kernel image
        run: |
          echo "=== Kernel boot files ==="
          ls -lh kernel/arch/arm64/boot/ || echo "Not found"

      - name: Pack AnyKernel3
        run: |
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3

          KERNEL_IMAGE=""
          for f in \
            kernel/arch/arm64/boot/Image.gz-dtb \
            kernel/arch/arm64/boot/Image.gz \
            kernel/arch/arm64/boot/Image \
            kernel/Image; do
            if [ -f "$f" ]; then
              KERNEL_IMAGE="$f"
              break
            fi
          done

          if [ -z "$KERNEL_IMAGE" ]; then
            echo "ERROR: Kernel image not found!"
            ls -lh kernel/arch/arm64/boot/ || echo "boot/ not found"
            exit 1
          fi

          cp -v "$KERNEL_IMAGE" AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=SM-A217F/' anykernel.sh || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh || true
          zip -r9 ../A21s-Kernel-KSU-OC.zip ./*

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: A21s-Kernel-KSU-OC
          path: A21s-Kernel-KSU-OC.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
