name: Build A21s Kernel (V9 FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 KernelSU chuẩn (đúng structure)
    - name: Add KernelSU (REAL FIXED)
      run: |
        cd kernel
        rm -rf drivers/kernelsu

        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz

        # ✅ đúng cấu trúc
        mv KernelSU-*/kernel drivers/kernelsu

        # add vào drivers/Kconfig nếu thiếu
        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        # verify
        if [ ! -f drivers/kernelsu/Kconfig ]; then
          echo "❌ KernelSU lỗi"
          exit 1
        fi

        echo "✅ KernelSU OK"

    # 🔥 bypass check ngu của samsung
    - name: Fix toolchain check
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts || true

    # 🔥 BUILD (an toàn, không phá vdso)
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # bật KernelSU
        scripts/config --enable KSU || true

        # ⚠️ KHÔNG disable VDSO nữa (gây lỗi thiếu file)
        # scripts/config --disable VDSO ❌

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 🔥 PACK ZIP FLASH (OrangeFox OK)
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        zip -r ../A21s-Kernel-KSU-V9.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU-V9
        path: A21s-Kernel-KSU-V9.zip
