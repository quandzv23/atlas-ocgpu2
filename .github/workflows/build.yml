name: Build A21s Kernel (FINAL FIX ALL)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libncurses-dev curl git

    # 🔥 TẢI CLANG TOOLCHAIN
    - name: Download Clang
      run: |
        git clone --depth=1 https://github.com/llvm/llvm-project clang

    # 🔥 CÀI KERNELSU
    - name: Integrate KernelSU
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Fix scripts
      run: |
        echo '#!/bin/sh' > scripts/min-tool-version.sh
        echo 'echo 0' >> scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts

    - name: Set environment
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV

    - name: Clean build
      run: |
        make clean || true
        make mrproper || true

    # 🚀 BUILD BẰNG CLANG (QUAN TRỌNG NHẤT)
    - name: Build kernel
      run: |
        export PATH=$PWD/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: |
          arch/arm64/boot/Image.gz
          arch/arm64/boot/dts/**/*.dtb
