name: Build A21s Kernel (FULL FINAL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 dọn disk
    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo apt clean

    # 🔥 cài toolchain chuẩn
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bc bison flex \
          libssl-dev libelf-dev \
          gcc g++ \
          clang lld \
          make python3

    # 🔥 clone kernel
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 clone clang nhẹ
    - name: Clone clang
      run: |
        git clone --depth=1 https://github.com/ZyCromerZ/Clang clang

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # 🔥 fake ccache (fix lỗi 127)
        mkdir -p fakebin
        cat << 'EOF' > fakebin/ccache
        #!/bin/bash
        exec "$@"
        EOF
        chmod +x fakebin/ccache
        export PATH=$PWD/fakebin:$PATH

        # 🔥 giữ gcc hệ thống + thêm clang
        export PATH=/usr/bin:$PATH
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        # 🔥 fix assembler / clang
        export LLVM=1
        export LLVM_IAS=1

        # 🔥 config
        make exynos850-a21snsxx_defconfig

        # 🔥 tắt vdso đúng cách
        echo "CONFIG_VDSO=n" >> .config
        echo "CONFIG_COMPAT_VDSO=n" >> .config

        # 🔥 tránh interactive
        yes "" | make olddefconfig

        # 🔥 fake vdso file (không phá Makefile)
        mkdir -p arch/arm64/kernel/vdso
        touch arch/arm64/kernel/vdso/vdso.lds
        touch arch/arm64/kernel/vdso/vdso.so.dbg

        # 🔥 build
        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image
