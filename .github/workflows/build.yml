name: Build A21s Kernel (KernelSU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ ccache \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 QUAN TRỌNG: thêm KernelSU
    - name: Add KernelSU
      run: |
        cd kernel
        rm -rf drivers/kernelsu
        git clone --depth=1 https://github.com/tiann/KernelSU drivers/kernelsu

    # 🔥 fix toolchain Samsung
    - name: Fix toolchain check
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # 🔥 enable KernelSU trong config
        scripts/config --enable KSU
        scripts/config --enable KSU_DEBUG || true

        # 🔥 fix VDSO (repo này thiếu)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        zip -r ../A21s-Kernel-KSU.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: A21s-Kernel-KSU.zip
