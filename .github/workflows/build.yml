name: 🔥 Build A21s Kernel (ULTIMATE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    # 🧹 DỌN DISK (cực quan trọng)
    - name: 🧹 Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        df -h

    # 📦 CÀI TOOL
    - name: ⚙️ Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential bc bison flex curl zip unzip \
          libssl-dev libelf-dev \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          lld llvm

    # 🔥 FIX CCACHE TRIỆT ĐỂ
    - name: 🧠 Fake ccache (no error)
      run: |
        sudo ln -sf /usr/bin/gcc /usr/bin/ccache

    # 📥 CLONE KERNEL
    - name: 📥 Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # ⚡ CLANG NHẸ (không full prebuilts)
    - name: ⚡ Get clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    # 🔧 FIX TOOLCHAIN SCRIPT THIẾU
    - name: 🔧 Fix missing scripts
      run: |
        cd kernel/scripts
        # một số repo thiếu file này
        echo '#!/bin/sh' > min-tool-version.sh
        echo 'echo 0' >> min-tool-version.sh
        chmod +x min-tool-version.sh

    # ⚙️ CONFIG
    - name: ⚙️ Configure
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        yes "" | make olddefconfig

    # 💥 FIX VDSO (repo này thiếu thật)
    - name: 💥 Disable VDSO (safe)
      run: |
        cd kernel

        echo "CONFIG_VDSO=n" >> .config
        echo "CONFIG_COMPAT_VDSO=n" >> .config

        yes "" | make olddefconfig

    # 🔥 BUILD
    - name: 🔥 Build kernel
      run: |
        cd kernel

        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++

        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

        export USE_CCACHE=0
        export CCACHE_DISABLE=1

        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=/usr/bin/ld \
          HOSTLD=/usr/bin/ld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 📦 OUTPUT
    - name: 📦 Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: kernel/arch/arm64/boot/Image*
