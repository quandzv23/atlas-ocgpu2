name: Build A21s Kernel (Fix Missing Script)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libncurses-dev curl git

    - name: Fix ccache
      run: |
        mkdir -p fakebin
        ln -s /usr/bin/env fakebin/ccache
        echo "$PWD/fakebin" >> $GITHUB_PATH

    - name: Clone KernelSU (FIX LỖI)
      run: |
        if [ ! -d "drivers/kernelsu" ]; then
          git clone https://github.com/tiann/KernelSU.git drivers/kernelsu
        fi

    - name: Fix permissions
      run: |
        chmod -R +x scripts

    - name: Fix missing scripts (IMPORTANT)
      run: |
        echo '#!/bin/sh' > scripts/min-tool-version.sh
        echo 'echo 0' >> scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh

    - name: Set environment
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV

    - name: Build kernel
      run: |
        make exynos_defconfig
        make -j$(nproc)

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: |
          arch/arm64/boot/Image.gz
          arch/arm64/boot/dts/**/*.dtb
