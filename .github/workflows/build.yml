name: Build A21s Kernel (FINAL STABLE)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🔥 FIX MIRROR (TRÁNH TREO)
    - name: Fix apt mirror
      run: |
        sudo sed -i 's|http://azure.archive.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential bc bison flex libssl-dev libncurses-dev curl git ccache

    # 🔥 DÙNG CCACHE THẬT (KHÔNG FAKE)
    - name: Setup ccache
      run: |
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV

    # 🔥 CLANG TOOLCHAIN GỌN NHẸ (KHÔNG DÙNG LLVM FULL)
    - name: Download Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    # 🔥 KERNELSU
    - name: Integrate KernelSU
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Fix scripts
      run: |
        echo '#!/bin/sh' > scripts/min-tool-version.sh
        echo 'echo 0' >> scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts

    - name: Set env
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV

    - name: Clean
      run: |
        make clean || true
        make mrproper || true

    # 🚀 BUILD CHUẨN
    - name: Build
      run: |
        export PATH=$PWD/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        make -j$(nproc) \
          CC="ccache clang" \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: |
          arch/arm64/boot/Image.gz
          arch/arm64/boot/dts/**/*.dtb
