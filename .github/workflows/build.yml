name: Build A21s Kernel (Clean Auto)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    - name: Clone Clang (auto)
      run: |
        git clone --depth=1 https://github.com/ZyCromerZ/Clang clang

    - name: Setup Clang ENV (AUTO DETECT)
      run: |
        # 🔥 tìm clang/bin thật
        CLANG_BIN=$(find $GITHUB_WORKSPACE/clang -type d -name bin | head -n 1)

        if [ -z "$CLANG_BIN" ]; then
          echo "❌ Không tìm thấy clang bin"
          exit 1
        fi

        echo "✅ CLANG_BIN=$CLANG_BIN"

        # 🔥 fix linker (tránh lỗi libc)
        ln -sf /usr/bin/ld.lld $CLANG_BIN/ld

        # 🔥 fake gcc (fix cannot find gcc)
        echo -e '#!/bin/bash\nexec clang "$@"' > $CLANG_BIN/gcc
        chmod +x $CLANG_BIN/gcc

        # 🔥 disable ccache
        echo "USE_CCACHE=0" >> $GITHUB_ENV

        # 🔥 export PATH
        echo "CLANG_BIN=$CLANG_BIN" >> $GITHUB_ENV
        echo "$CLANG_BIN" >> $GITHUB_PATH

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # 🔥 disable VDSO (fix thiếu vdso.lds)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        # 🔥 auto config (no interactive)
        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pack AnyKernel3 (Flash OrangeFox)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        zip -r ../A21s-Kernel.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: A21s-Kernel.zip
