name: Build A21s Kernel (FINAL NO-CCACHE-FAIL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔧 Toolchain chuẩn
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    # 🔥 FIX CCACHE TRIỆT ĐỂ (QUAN TRỌNG NHẤT)
    - name: Fix ccache wrapper
      run: |
        sudo mkdir -p /usr/local/bin

        # tạo wrapper ccache đúng chuẩn
        echo '#!/bin/bash' | sudo tee /usr/local/bin/ccache
        echo 'exec "$@"' | sudo tee -a /usr/local/bin/ccache

        sudo chmod +x /usr/local/bin/ccache

        # ưu tiên PATH
        echo "/usr/local/bin" >> $GITHUB_PATH

        which ccache
        ccache gcc --version || true

    # 📦 Clone kernel
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 Add KernelSU (tarball ổn định)
    - name: Add KernelSU
      run: |
        cd kernel

        rm -rf drivers/kernelsu

        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz

        mv KernelSU-*/kernel drivers/kernelsu

        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        test -f drivers/kernelsu/Kconfig

    # 🔧 Fix toolchain check Samsung
    - name: Fix toolchain check
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh

    # 🔥 BUILD
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        scripts/config --enable KSU || true

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          KCFLAGS="-gdwarf-4" \
          HOSTCFLAGS="-gdwarf-4"
          

    # 📦 Pack flash zip
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=a21s/' anykernel.sh || true

        zip -r ../A21s-Kernel-KSU.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: A21s-Kernel-KSU.zip
