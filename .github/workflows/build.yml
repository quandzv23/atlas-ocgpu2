name: Build Kernel A21s

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup build env
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev make \
            libc6-dev libncurses5-dev \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip
      - name: 📥 Clone kernel
        run: |
          rm -rf kernel
          git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

      - name: ⚡ Clone Clang (Proton - nhẹ)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: 🔧 Fix Samsung source
        run: |
          cd kernel

          # FIX thiếu script
          cat << 'EOF' > scripts/min-tool-version.sh
          #!/bin/sh
          echo 0
          EOF
          chmod +x scripts/min-tool-version.sh

          # bypass assembler check
          sed -i 's/exit 1/exit 0/g' scripts/Kconfig.include || true

          # remove vdso (repo lỗi thiếu file)
          rm -rf arch/arm64/kernel/vdso || true

      - name: ⚙️ Configure
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

          make exynos850-a21snsxx_defconfig
          yes "" | make olddefconfig

      - name: 🔥 Build kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export USE_CCACHE=0
          export CCACHE_DISABLE=1
          
          make -j$(nproc) \
            CC=clang \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: 📦 Pack AnyKernel3 ZIP
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel

          cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel/ || true
          cp kernel/arch/arm64/boot/Image.gz AnyKernel/ || true

          cd AnyKernel
          zip -r9 kernel-a21s.zip *

      - name: ⬆️ Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: kernel-a21s
          path: AnyKernel/kernel-a21s.zip
