name: Build A21s Kernel (FINAL-KSU-FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔧 Toolchain chuẩn
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    # 🔥 FIX CCACHE
    - name: Fix ccache wrapper
      run: |
        sudo mkdir -p /usr/local/bin
        echo '#!/bin/bash' | sudo tee /usr/local/bin/ccache
        echo 'exec "$@"' | sudo tee -a /usr/local/bin/ccache
        sudo chmod +x /usr/local/bin/ccache
        echo "/usr/local/bin" >> $GITHUB_PATH

    # 📦 Clone kernel
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 Add KernelSU & FIX Header Triệt Để
    - name: Add KernelSU
      run: |
        cd kernel
        rm -rf drivers/kernelsu
        
        # Tải KernelSU bản main
        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz
        mv KernelSU-*/kernel drivers/kernelsu
        
        # [FIX TỐI THƯỢNG] Ép Kbuild nhận diện uapi và KSU_VERSION cho toàn bộ thư mục con
        # Lệnh này chèn cờ subdir-ccflags-y lên DÒNG ĐẦU TIÊN của file Kbuild
        sed -i '1i subdir-ccflags-y += -I$(srctree)/drivers/kernelsu/uapi -I$(srctree)/drivers/kernelsu -DKSU_VERSION=11950' drivers/kernelsu/Kbuild

        # Thêm vào Kconfig
        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

    # 🔧 Fix toolchain check & Permissions
    - name: Fix Permissions and Scripts
      run: |
        cd kernel
        chmod +x scripts/config
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh

    # 🔥 BUILD
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="Gemini"
        export KBUILD_BUILD_HOST="Github-Actions"

        # Config mặc định
        make exynos850-a21snsxx_defconfig

        # Bật các module cần thiết cho KSU
        ./scripts/config --enable KSU
        ./scripts/config --enable KPROBES
        ./scripts/config --enable OVERLAY_FS
        ./scripts/config --enable KPROBE_EVENTS

        # Áp dụng config mới tự động điền 'yes' cho các tùy chọn mới
        make olddefconfig

        # Bắt đầu compile
        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          KCFLAGS="-gdwarf-4" \
          HOSTCFLAGS="-gdwarf-4"

    # 📦 Pack flash zip
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3
        
        # Copy file boot image đã build xong
        if [ -f kernel/arch/arm64/boot/Image.gz-dtb ]; then
          cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        elif [ -f kernel/arch/arm64/boot/Image ]; then
          cp kernel/arch/arm64/boot/Image AnyKernel3/
        fi

        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=a21s/' anykernel.sh
        zip -r ../A21s-Kernel-KSU.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: A21s-Kernel-KSU.zip
