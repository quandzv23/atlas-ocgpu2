name: Build A21s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: 🧹 Clean disk (tránh full)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        df -h

    - name: 📥 Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    - name: ⚙️ Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          gcc \
          g++ \
          make \
          git

    - name: 🧠 Clone clang (Proton nhẹ)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    - name: 🔧 Fix Samsung source
      run: |
        cd kernel

        # fix thiếu script
        mkdir -p scripts
        cat << 'EOF' > scripts/min-tool-version.sh
        #!/bin/sh
        echo 0
        EOF
        chmod +x scripts/min-tool-version.sh

        # bypass assembler check
        sed -i 's/exit 1/exit 0/g' scripts/Kconfig.include || true

        # remove vdso (repo thiếu file)
        rm -rf arch/arm64/kernel/vdso || true

    - name: ⚙️ Configure kernel
      run: |
        cd kernel
        make exynos850-a21snsxx_defconfig
        yes "" | make olddefconfig

    - name: 🔥 Build kernel (stable)
      run: |
        cd kernel

        export CC=$GITHUB_WORKSPACE/clang/bin/clang
        export CLANG_TRIPLE=aarch64-linux-gnu-

        # đảm bảo không dính clang ld
        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

        export USE_CCACHE=0
        export CCACHE_DISABLE=1

        make -j$(nproc) \
          CC=$CC \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=/usr/bin/ld \
          HOSTLD=/usr/bin/ld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: 📦 Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Image
        path: kernel/arch/arm64/boot/Image*
