name: Build A21s Kernel (V6 AUTO HEAL + KSU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ ccache \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    # 🔥 Clone sạch
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 AUTO FIX EVERYTHING
    - name: Auto Fix (KernelSU + toolchain + script)
      run: |
        cd kernel

        echo "==== FIX KernelSU ===="
        rm -rf drivers/kernelsu
        git clone --depth=1 https://github.com/tiann/KernelSU drivers/kernelsu || true

        # nếu clone fail → tạo dummy để không crash
        if [ ! -f drivers/kernelsu/Kconfig ]; then
          echo "⚠️ KernelSU clone fail → tạo dummy"
          mkdir -p drivers/kernelsu
          echo 'config KSU\n\tbool "KernelSU"\n\tdefault n' > drivers/kernelsu/Kconfig
        fi

        echo "==== FIX Samsung toolchain check ===="
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod +x scripts/*.sh || true

        echo "==== FIX VDSO (missing source) ===="
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        echo "==== DEBUG ===="
        ls drivers/kernelsu || true

    - name: Setup ENV
      run: |
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    # 🔥 BUILD
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # 🔥 QUAN TRỌNG: sau khi fix xong mới defconfig
        make exynos850-a21snsxx_defconfig

        # 🔥 enable KernelSU nếu có
        scripts/config --enable KSU || true

        # tránh interactive
        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 🔥 PACK FLASH ZIP
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        zip -r ../A21s-Kernel-KSU-V6.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU-V6
        path: A21s-Kernel-KSU-V6.zip
