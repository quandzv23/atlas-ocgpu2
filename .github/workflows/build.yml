name: Build A21s Kernel (FINAL FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔧 Cài toolchain chuẩn
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    # 🔍 Verify compiler
    - name: Verify toolchain
      run: |
        which gcc
        gcc --version
        which clang
        clang --version

    # 📦 Clone kernel
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 ADD KERNELSU (TARBALL - ỔN ĐỊNH)
    - name: Add KernelSU (stable tarball)
      run: |
        cd kernel

        rm -rf drivers/kernelsu

        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz

        # move đúng structure
        mv KernelSU-*/kernel drivers/kernelsu

        # inject Kconfig
        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        # verify
        if [ ! -f drivers/kernelsu/Kconfig ]; then
          echo "❌ KernelSU lỗi"
          exit 1
        fi

        echo "✅ KernelSU OK"

    # 🔧 Fix Samsung toolchain check
    - name: Fix toolchain check
      run: |
        cd kernel
        if [ -f scripts/min-tool-version.sh ]; then
          echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
          chmod +x scripts/min-tool-version.sh
        fi

    # 💀 XÓA CCACHE TRIỆT ĐỂ
    - name: Remove ccache
      run: |
        cd kernel

        # remove trong source
        find . -type f -name "Makefile*" -exec sed -i 's/ccache //g' {} +

        # clear env
        unset CCACHE || true
        unset CCACHE_DIR || true
        unset CCACHE_BASEDIR || true

        # fix Makefile.host nếu có
        sed -i 's/ccache gcc/gcc/g' scripts/Makefile.host || true

    # 🔥 BUILD (FORCE COMPILER)
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++

        make exynos850-a21snsxx_defconfig

        scripts/config --enable KSU || true

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 📦 Pack AnyKernel3
    - name: Pack flashable zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=a21s/' anykernel.sh || true

        zip -r ../A21s-Kernel-KSU-FINAL.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU-FINAL
        path: A21s-Kernel-KSU-FINAL.zip
