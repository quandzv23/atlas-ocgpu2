name: Build A21s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Setup build env
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential bc bison flex curl zip unzip \
          libssl-dev libelf-dev \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    # 🔥 Lấy kernel
    - name: 📥 Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 Clang NHẸ (tránh full prebuilts nặng -> hết disk)
    - name: ⚡ Download clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    # 🔥 FIX CCACHE (QUAN TRỌNG)
    - name: ❌ Remove ccache
      run: |
        cd kernel
        grep -rl "ccache" . | xargs sed -i 's/ccache //g' || true

    # 🔥 FIX linker lỗi RELR
    - name: 🔧 Force system linker
      run: |
        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

    # 🔥 CONFIG (NON-INTERACTIVE)
    - name: ⚙️ Configure kernel
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        # auto config không hỏi
        yes "" | make olddefconfig

    # 🔥 FIX VDSO (repo này thiếu file vdso)
    - name: 💥 Disable VDSO safely
      run: |
        cd kernel

        echo "CONFIG_VDSO=n" >> .config
        echo "CONFIG_COMPAT_VDSO=n" >> .config

        yes "" | make olddefconfig

    # 🔥 BUILD
    - name: 🔥 Build kernel
      run: |
        cd kernel

        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++

        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

        export USE_CCACHE=0
        export CCACHE_DISABLE=1

        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=/usr/bin/ld \
          HOSTLD=/usr/bin/ld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 📦 PACK OUTPUT
    - name: 📦 Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image*
