name: Build A21s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget file \
            bc bison flex zip unzip \
            libssl-dev make \
            libc6-dev libncurses5-dev libelf-dev \
            gcc g++ \
            clang lld llvm \
            python3 python2 binutils

      - name: Fix ccache
        run: |
          sudo mkdir -p /usr/local/bin
          printf '#!/bin/bash\nexec "$@"\n' | sudo tee /usr/local/bin/ccache
          sudo chmod +x /usr/local/bin/ccache
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          rm -rf kernel
          git clone --depth=1 \
            https://github.com/samsungexynos850/atlas \
            kernel

      - name: Remove KernelSU hooks from kernel
        run: |
          cd kernel
          
          echo "[*] Removing KernelSU hook calls from kernel source..."
          
          # kernel/reboot.c - ksu_handle_sys_reboot
          if grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            echo "[+] Removing ksu_handle_sys_reboot from kernel/reboot.c"
            sed -i 's/.*ksu_handle_sys_reboot.*/\/\/ &/g' kernel/reboot.c
          fi
          
          # fs/read_write.c - ksu_vfs_read_hook
          if grep -q "ksu_vfs_read_hook" fs/read_write.c; then
            echo "[+] Removing ksu_vfs_read_hook from fs/read_write.c"
            sed -i 's/.*ksu_vfs_read_hook.*/\/\/ &/g' fs/read_write.c
          fi
          
          # fs/exec.c - ksu_execveat_hook
          if grep -q "ksu_execveat_hook" fs/exec.c; then
            echo "[+] Removing ksu_execveat_hook from fs/exec.c"
            sed -i 's/.*ksu_execveat_hook.*/\/\/ &/g' fs/exec.c
          fi
          
          # drivers/input/input.c - ksu_input_hook
          if grep -q "ksu_input_hook" drivers/input/input.c; then
            echo "[+] Removing ksu_input_hook from drivers/input/input.c"
            sed -i 's/.*ksu_input_hook.*/\/\/ &/g' drivers/input/input.c
          fi
          
          echo "[+] Kernel hook removal done"

      - name: Setup KernelSU v0.9.5
        run: |
          cd kernel
          rm -rf KernelSU drivers/kernelsu drivers/ksu

          git clone --depth=1 \
            -b v0.9.5 \
            https://github.com/tiann/KernelSU.git \
            KernelSU

          bash KernelSU/kernel/setup.sh

          KSU_DIR=$(find -L drivers -type d \( -name "kernelsu" -o -name "ksu" \) | head -n 1)
          [ -z "$KSU_DIR" ] && KSU_DIR="KernelSU/kernel"
          echo "Using KSU_DIR=$KSU_DIR"

          sed -i '/MODULE_IMPORT_NS/d' "$KSU_DIR/core/init.c" || true

          echo "[+] KernelSU v0.9.5 setup done"

      - name: GPU Overclock Mali-G52 1196MHz
        run: |
          cd kernel
          echo "[*] GPU overclock patch..."
          
          # Find GPU DVFS tables
          GPU_TABLE=$(grep -rl "gpu_dvfs_table\|gpu_max_clock" \
            drivers/gpu/ arch/ --include="*.c" --include="*.h" 2>/dev/null | head -n 3)

          for f in $GPU_TABLE; do
            if grep -q "949" "$f" 2>/dev/null; then
              sed -i '/949000/a\\t\t1196000,' "$f" || true
              echo "[+] Added 1196MHz to $f"
            fi
          done
          
          echo "[+] GPU OC done"

      - name: Fix scripts
        run: |
          cd kernel
          chmod +x scripts/config || true
          printf '#!/bin/sh\nexit 0\n' > scripts/min-tool-version.sh
          chmod +x scripts/min-tool-version.sh

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Gemini"
          export KBUILD_BUILD_HOST="Github-Actions"

          make exynos850-a21snsxx_defconfig

          ./scripts/config --enable KSU || true
          ./scripts/config --enable KPROBES || true
          ./scripts/config --enable OVERLAY_FS || true
          ./scripts/config --enable KPROBE_EVENTS || true
          ./scripts/config --disable LTO || true
          ./scripts/config --disable CFI_CLANG || true

          yes "" | make olddefconfig

          # Main build
          make -j$(nproc) \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            2>&1 | tee ../build.log

          # Explicit Image target (IMPORTANT!)
          echo "[*] Building Image explicitly..."
          make Image.gz-dtb \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            2>&1 | tee -a ../build.log

          # Check if build succeeded
          if [ $? -eq 0 ]; then
            echo "[+] Build SUCCESS!"
          else
            echo "[!] Build Image target had issues, but continuing..."
          fi

      - name: Check kernel image
        run: |
          echo "=== Kernel boot directory ==="
          ls -lh kernel/arch/arm64/boot/ || echo "boot/ not found"
          echo ""
          echo "=== Search for Image in kernel ==="
          find kernel -name "Image*" -o -name "vmlinux*" -o -name "zImage*" 2>/dev/null | head -10
          echo ""
          echo "=== Check build result ==="
          if [ -f kernel/arch/arm64/boot/Image.gz-dtb ]; then
            echo "[✓] Image.gz-dtb found"
          elif [ -f kernel/arch/arm64/boot/Image ]; then
            echo "[✓] Image found"
          else
            echo "[!] No Image found - build may have failed"
            tail -100 build.log | grep -i "error\|warning" | tail -20
          fi

      - name: Pack AnyKernel3
        run: |
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3

          KERNEL_IMAGE=""
          # Try multiple paths in order
          for f in \
            kernel/arch/arm64/boot/Image.gz-dtb \
            kernel/arch/arm64/boot/Image.gz \
            kernel/arch/arm64/boot/Image \
            kernel/Image.gz-dtb \
            kernel/Image.gz \
            kernel/Image; do
            if [ -f "$f" ]; then
              KERNEL_IMAGE="$f"
              echo "[+] Found: $KERNEL_IMAGE ($(stat -f%z "$f" 2>/dev/null || stat -c%s "$f"))"
              break
            fi
          done

          if [ -z "$KERNEL_IMAGE" ]; then
            echo "ERROR: Kernel image not found!"
            echo ""
            echo "Searching all files in kernel:"
            find kernel/arch/arm64/boot/ -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "[+] Using: $KERNEL_IMAGE"
          cp -v "$KERNEL_IMAGE" AnyKernel3/
          
          cd AnyKernel3
          # Ensure Image name is standard for AnyKernel3
          if [ -f "Image.gz-dtb" ]; then
            :
          elif [ -f "Image.gz" ]; then
            [ ! -f "Image.gz-dtb" ] && cp Image.gz Image.gz-dtb || true
          elif [ -f "Image" ]; then
            [ ! -f "Image.gz-dtb" ] && gzip -k -9 Image && mv Image.gz Image.gz-dtb 2>/dev/null || true
          fi
          
          sed -i 's/device.name1=.*/device.name1=SM-A217F/' anykernel.sh || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh || true
          zip -r9 ../A21s-Kernel-KSU-OC.zip ./*
          
          echo "[✓] Kernel zip created"

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: A21s-Kernel-KSU-OC
          path: A21s-Kernel-KSU-OC.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
