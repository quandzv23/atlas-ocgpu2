name: Build A21s Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget file \
            bc bison flex zip unzip \
            libssl-dev make \
            libc6-dev libncurses5-dev libelf-dev \
            gcc g++ gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            python3 binutils

      - name: Fix ccache
        run: |
          sudo mkdir -p /usr/local/bin
          printf '#!/bin/bash\nexec "$@"\n' | sudo tee /usr/local/bin/ccache
          sudo chmod +x /usr/local/bin/ccache
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          rm -rf kernel
          git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

      - name: Setup KernelSU v0.9.5
        run: |
          cd kernel
          rm -rf drivers/kernelsu drivers/ksu KernelSU
          git clone --depth=1 \
            -b v0.9.5 \
            https://github.com/tiann/KernelSU.git \
            KernelSU
          bash KernelSU/kernel/setup.sh
          KSU_DIR=$(find -L drivers -type d \( -name kernelsu -o -name ksu \) | head -n 1)
          if [ -z "$KSU_DIR" ]; then
            KSU_DIR="KernelSU/kernel"
          fi
          echo "Using KSU_DIR=$KSU_DIR"
          sed -i '/MODULE_IMPORT_NS/d' "$KSU_DIR/core/init.c" || true

      - name: GPU Overclock Mali-G52 1196MHz
        run: |
          cd kernel
          GPU_TABLE=$(grep -rl \
            "gpu_dvfs_table\|gpu_max_clock" \
            drivers/gpu \
            arch \
            --include="*.c" \
            --include="*.h" \
            2>/dev/null | head -n 5)
          for f in $GPU_TABLE; do
            if grep -q "949000" "$f"; then
              sed -i '/949000/a\        1196000,' "$f" || true
              echo "[+] OC patched: $f"
            fi
          done

      - name: Fix scripts
        run: |
          cd kernel
          chmod +x scripts/config || true
          printf '#!/bin/sh\nexit 0\n' > scripts/min-tool-version.sh
          chmod +x scripts/min-tool-version.sh

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          make exynos850-a21snsxx_defconfig
          ./scripts/config --enable KPROBES || true
          ./scripts/config --enable KPROBE_EVENTS || true
          ./scripts/config --enable OVERLAY_FS || true
          ./scripts/config --disable LTO || true
          ./scripts/config --disable LTO_CLANG || true
          ./scripts/config --disable CFI_CLANG || true
          ./scripts/config --disable SHADOW_CALL_STACK || true
          make olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Gemini"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          # Giúp phát hiện lỗi chính xác khi dùng lệnh kiểm tra chéo (pipe '|')
          set -o pipefail

          make -j$(nproc) \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            2>&1 | tee ../build.log

      - name: Verify output
        if: always()
        run: |
          echo "===== BOOT FILES ====="
          find kernel/arch/arm64/boot \
            -type f \
            \( -name "Image*" -o -name "*.dtb" \) || true

      - name: Show build errors
        if: always()
        run: |
          echo "===== LAST ERRORS ====="
          grep -i "error:" build.log | tail -50 || true

      - name: Pack AnyKernel3
        run: |
          rm -rf AnyKernel3
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3
          KERNEL_IMAGE=$(find kernel/arch/arm64/boot \
            -type f \
            \( -name "Image.gz-dtb" -o -name "Image.gz" -o -name "Image" \) \
            | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
            echo "===== BUILD FAILED ====="
            tail -200 build.log || true
            exit 1
          fi
          echo "Using: $KERNEL_IMAGE"
          cp -v "$KERNEL_IMAGE" AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=SM-A217F/' anykernel.sh || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh || true
          zip -r9 ../A21s-Kernel-KSU-OC.zip ./*

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: A21s-Kernel-KSU-OC
          path: A21s-Kernel-KSU-OC.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            kernel/.config
