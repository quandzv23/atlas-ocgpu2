name: Build A21s Kernel (FULL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 Dọn sạch để tránh "No space left"
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo apt clean

    # 🔥 Cài full toolchain chuẩn (fix gcc + ld + libc)
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bc bison flex \
          libssl-dev libelf-dev \
          gcc g++ \
          clang lld \
          make \
          python3

    # 🔥 Clone kernel (đảm bảo sạch)
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 Clang NHẸ (không bị full repo -> tránh hết disk)
    - name: Clone clang
      run: |
        git clone --depth=1 https://github.com/ZyCromerZ/Clang clang

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # 🔥 QUAN TRỌNG: giữ system toolchain
        export PATH=/usr/bin:$PATH
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        # 🔥 TẮT CCACHE (fix lỗi 127)
        export CCACHE_DISABLE=1

        # 🔥 FIX assembler error (repo Samsung hay dính)
        export LLVM=1
        export LLVM_IAS=1

        # 🔥 FIX VDSO thiếu file (KHÔNG phá Makefile)
        sed -i '/vdso/d' arch/arm64/Makefile

        # 🔥 config
        make exynos850-a21snsxx_defconfig

        # 🔥 FIX interactive
        yes "" | make olddefconfig

        # 🔥 BUILD
        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 🔥 Xuất kernel
    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image
