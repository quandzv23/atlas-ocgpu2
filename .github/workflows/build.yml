name: Build A21s Kernel (Exynos 850 + KSU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Clone Kernel Source
        run: |
          git clone https://github.com/samsungexynos850/atlas kernel

      - name: 📦 Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison flex libssl-dev make \
            libc6-dev libncurses5-dev \
            crossbuild-essential-arm64 \
            crossbuild-essential-armhf \
            gcc g++ clang lld

      - name: ⚙️ Setup Clang (FIX CHUẨN)
        run: |
          cd kernel
          git clone --depth=1 --branch llvmorg-17.0.0 https://github.com/llvm/llvm-project clang

      - name: 🔧 Setup KernelSU
        run: |
          cd kernel
          git clone https://github.com/tiann/KernelSU
          echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos850-a21snsxx_defconfig

      - name: 🛠 Build Kernel
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$PWD/clang/bin:/usr/bin:$PATH

          make exynos850-a21snsxx_defconfig

          # ✅ AUTO config (fix interactive)
          yes "" | make olddefconfig

          # ✅ FIX VDSO (QUAN TRỌNG)
          scripts/config --disable VDSO || true
          scripts/config --disable COMPAT_VDSO || true

          # 👉 tạo vdso giả tránh lỗi thiếu file
          mkdir -p arch/arm64/kernel/vdso
          echo "SECTIONS {}" > arch/arm64/kernel/vdso/vdso.lds

          # ✅ BUILD
          make -j$(nproc) \
            CC=clang \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image.gz-dtb

      - name: 📦 Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: A21s-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb
