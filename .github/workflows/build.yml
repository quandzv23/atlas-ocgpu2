name: Build A21s Kernel (V10 DAILY)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 KernelSU chuẩn
    - name: Add KernelSU (REAL)
      run: |
        cd kernel
        rm -rf drivers/kernelsu

        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz

        mv KernelSU-*/kernel drivers/kernelsu

        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        test -f drivers/kernelsu/Kconfig || exit 1

    # 🔥 FIX TOOLCHAIN CHECK
    - name: Fix Samsung checks
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts || true

    # 🔥 REMOVE CCACHE TRIỆT ĐỂ
    - name: Remove ccache
      run: |
        cd kernel
        find . -type f -name "Makefile*" -exec sed -i 's/ccache //g' {} +

    # 🔥 BUILD (SAFE CONFIG)
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # bật KernelSU
        scripts/config --enable KSU || true

        # ⚠️ GIỮ NGUYÊN CONFIG QUAN TRỌNG (để boot ổn định)
        # KHÔNG đụng VDSO
        # KHÔNG OC
        # KHÔNG tweak deep

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 🔥 PACK FLASH ZIP (chuẩn OrangeFox)
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3

        # set device name cho an toàn
        sed -i 's/device.name1=.*/device.name1=a21s/' anykernel.sh || true

        zip -r ../A21s-Kernel-KSU-V10.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU-V10
        path: A21s-Kernel-KSU-V10.zip
