name: Build A21s Kernel (NO-FAIL CCACHE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔥 CÀI TOOLCHAIN
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    # 🔥 DIỆT CCACHE TỪ GỐC
    - name: Kill ccache completely
      run: |
        sudo apt purge -y ccache || true
        sudo rm -rf /usr/bin/ccache || true
        sudo rm -rf /usr/lib/ccache || true

        # 🔥 fake ccache = gcc (ultimate fallback)
        sudo ln -sf /usr/bin/gcc /usr/bin/ccache

    # 🔥 CLONE KERNEL
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 ADD KERNELSU CHUẨN
    - name: Add KernelSU
      run: |
        cd kernel
        rm -rf drivers/kernelsu

        curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz
        tar -xzf ksu.tar.gz

        mv KernelSU-*/kernel drivers/kernelsu

        grep -q "kernelsu/Kconfig" drivers/Kconfig || \
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

        test -f drivers/kernelsu/Kconfig || exit 1

    # 🔥 FIX TOOLCHAIN CHECK SAMSUNG
    - name: Fix toolchain check
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts || true

    # 🔥 XÓA CCACHE TRONG SOURCE
    - name: Remove ccache from source
      run: |
        cd kernel
        find . -type f -name "Makefile*" -exec sed -i 's/ccache //g' {} +

    # 🔥 BUILD (OVERRIDE TRIỆT ĐỂ)
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # 🔥 override compiler tuyệt đối
        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++

        make exynos850-a21snsxx_defconfig

        scripts/config --enable KSU || true

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++

    # 🔥 PACK FLASH ZIP
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=a21s/' anykernel.sh || true

        zip -r ../A21s-Kernel-KSU.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU
        path: A21s-Kernel-KSU.zip
