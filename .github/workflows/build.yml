name: Build A21s Kernel (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    - name: Clone Clang PREBUILT (NHẸ + CHẮC)
      run: |
        git clone --depth=1 https://github.com/Neutron-Toolchains/clang clang

    - name: Setup ENV
      run: |
        # ✅ Clang chuẩn luôn có bin
        export CLANG_PATH=$GITHUB_WORKSPACE/clang/bin

        echo "CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
        echo "$CLANG_PATH" >> $GITHUB_PATH

        # ❌ tắt ccache hoàn toàn
        echo "USE_CCACHE=0" >> $GITHUB_ENV

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$CLANG_PATH:$PATH

        make exynos850-a21snsxx_defconfig

        # 🔥 Fix VDSO (lỗi repo atlas)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        # 🔥 auto config
        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        zip -r ../A21s-Kernel.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: A21s-Kernel.zip
