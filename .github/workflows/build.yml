name: Build Kernel A21s

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make libc6-dev \
          libncurses5-dev libelf-dev gcc g++ \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    - name: Clone clang (NHẸ + KHÔNG FULL)
      run: |
        git clone --depth=1 https://github.com/ZyCromerZ/Clang clang

    - name: Fix môi trường
      run: |
        # 🔥 Fix lỗi linker clang dùng nhầm ld
        ln -sf /usr/bin/ld.lld clang/bin/ld

        # 🔥 Fix fake gcc (tránh lỗi cannot find gcc)
        echo -e '#!/bin/bash\nexec clang "$@"' > clang/bin/gcc
        chmod +x clang/bin/gcc

        # 🔥 Disable ccache hoàn toàn
        export USE_CCACHE=0

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        # 🔥 Disable VDSO (Cách 1 - chuẩn)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        # 🔥 Fix interactive
        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pack AnyKernel3 (flash OrangeFox)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3
        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/

        cd AnyKernel3
        zip -r ../A21s-Kernel.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: A21s-Kernel.zip
