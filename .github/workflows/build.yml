name: Build A21s Kernel (Flashable ZIP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64

    steps:
    - name: Checkout Kernel
      run: |
        git clone https://github.com/samsungexynos850/atlas kernel
        cd kernel

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          python3 zip

    - name: Clone Clang (Proton)
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    - name: Build Kernel
      run: |
        cd kernel

        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        make exynos850-a21snsxx_defconfig

        # ✅ fix config (no interactive)
        yes "" | make olddefconfig

        # ✅ tắt VDSO đúng cách (KHÔNG phá Makefile)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        make olddefconfig

        # 🔥 build
        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Create flashable ZIP (AnyKernel3)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
        # nếu có dtb/dtbo thì copy thêm:
        cp kernel/arch/arm64/boot/dtb.img AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        zip -r9 A21s-Kernel.zip *

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: AnyKernel3/A21s-Kernel.zip
