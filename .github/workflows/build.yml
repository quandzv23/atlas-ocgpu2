name: Build A21s Kernel (Stable Fix v2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 Dọn disk tránh lỗi hết dung lượng
    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo apt clean

    # 🔥 Toolchain chuẩn
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          bc bison flex \
          libssl-dev libelf-dev \
          gcc g++ \
          clang lld \
          make \
          python3

    # 🔥 Clone kernel sạch
    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 Clang nhẹ (tránh hết disk)
    - name: Clone clang
      run: |
        git clone --depth=1 https://github.com/ZyCromerZ/Clang clang

    - name: Build
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # 🔥 giữ gcc hệ thống + thêm clang
        export PATH=/usr/bin:$PATH
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        # 🔥 fix toàn bộ lỗi trước đó
        export CCACHE_DISABLE=1
        export LLVM=1
        export LLVM_IAS=1

        # 🔥 config
        make exynos850-a21snsxx_defconfig

        # 🔥 disable vdso đúng cách (KHÔNG sửa Makefile)
        echo "CONFIG_VDSO=n" >> .config
        echo "CONFIG_COMPAT_VDSO=n" >> .config

        # 🔥 auto config (fix loop)
        yes "" | make olddefconfig

        # 🔥 fake vdso file (fix thiếu file)
        mkdir -p arch/arm64/kernel/vdso
        touch arch/arm64/kernel/vdso/vdso.lds

        # 🔥 build
        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image
