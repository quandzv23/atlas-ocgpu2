name: Build A21s Kernel (V8 STABLE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          git curl bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # 🔥 KernelSU bằng tarball (anti-fail)
    - name: Add KernelSU (tarball + retry)
      run: |
        cd kernel
        rm -rf drivers/kernelsu

        for i in 1 2 3; do
          echo "Download attempt $i"
          curl -L https://github.com/tiann/KernelSU/archive/refs/heads/main.tar.gz -o ksu.tar.gz && break
          sleep 2
        done

        if [ ! -f ksu.tar.gz ]; then
          echo "❌ KernelSU download failed"
          exit 1
        fi

        tar -xzf ksu.tar.gz
        mv KernelSU-* drivers/kernelsu

        if [ ! -f drivers/kernelsu/Kconfig ]; then
          echo "❌ KernelSU invalid"
          exit 1
        fi

        echo "✅ KernelSU ready"

    # 🔥 bypass Samsung toolchain check
    - name: Fix toolchain check
      run: |
        cd kernel
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh
        chmod -R +x scripts || true

    # 🔥 BUILD
    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # bật KernelSU
        scripts/config --enable KSU || true

        # fix VDSO
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 🔥 pack flash
    - name: Pack AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

        cd AnyKernel3
        zip -r ../A21s-Kernel-KSU-V8.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-KSU-V8
        path: A21s-Kernel-KSU-V8.zip
