name: Build A21s Kernel (FINAL V4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup deps
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev libelf-dev \
          gcc g++ ccache \
          clang lld llvm \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    - name: Fix Samsung toolchain check (bypass assembler check)
      run: |
        cd kernel

        # 🔥 Fix missing script + bypass version check
        mkdir -p scripts
        echo -e '#!/bin/sh\nexit 0' > scripts/min-tool-version.sh
        chmod +x scripts/min-tool-version.sh

        # 🔥 đảm bảo script khác chạy được
        chmod +x scripts/*.sh || true

    - name: Setup ENV
      run: |
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    - name: Build kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make exynos850-a21snsxx_defconfig

        # 🔥 Fix VDSO (repo atlas thiếu)
        scripts/config --disable VDSO || true
        scripts/config --disable COMPAT_VDSO || true

        # 🔥 tránh interactive
        yes "" | make olddefconfig

        make -j$(nproc) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pack AnyKernel3 (Flash OrangeFox)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3

        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || true
        cp kernel/arch/arm64/boot/Image AnyKernel3/ || true

        cd AnyKernel3
        zip -r ../A21s-Kernel.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel
        path: A21s-Kernel.zip
