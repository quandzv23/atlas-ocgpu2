name: 🔥 Build A21s Kernel V2 (ULTIMATE STABLE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    # 🧹 Dọn ổ (tránh hết disk)
    - name: 🧹 Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        df -h

    # ⚙️ Cài toolchain
    - name: ⚙️ Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential bc bison flex curl zip unzip \
          libssl-dev libelf-dev \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          lld llvm

    # 🧠 Fake ccache (khỏi lỗi)
    - name: 🧠 Fake ccache
      run: |
        sudo ln -sf /usr/bin/gcc /usr/bin/ccache

    # 📥 Clone kernel
    - name: 📥 Clone kernel
      run: |
        rm -rf kernel
        git clone --depth=1 https://github.com/samsungexynos850/atlas kernel

    # ⚡ Clang nhẹ
    - name: ⚡ Get clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    # 💀 Kill clang linker (cực quan trọng)
    - name: 💀 Fix linker (critical)
      run: |
        rm -f clang/bin/ld || true

    # 🔧 Fix script thiếu
    - name: 🔧 Fix scripts
      run: |
        cd kernel/scripts
        echo '#!/bin/sh' > min-tool-version.sh
        echo 'echo 0' >> min-tool-version.sh
        chmod +x min-tool-version.sh

    # ⚙️ CONFIG (non-interactive + đúng linker)
    - name: ⚙️ Configure
      run: |
        cd kernel

        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

        make exynos850-a21snsxx_defconfig

        yes "" | make olddefconfig

    # 💥 Disable VDSO (repo lỗi thiếu file)
    - name: 💥 Disable VDSO
      run: |
        cd kernel

        echo "CONFIG_VDSO=n" >> .config
        echo "CONFIG_COMPAT_VDSO=n" >> .config

        yes "" | make olddefconfig

    # 🔥 BUILD
    - name: 🔥 Build kernel
      run: |
        cd kernel

        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

        export CC=clang
        export HOSTCC=gcc
        export HOSTCXX=g++

        export LD=/usr/bin/ld
        export HOSTLD=/usr/bin/ld

        export USE_CCACHE=0
        export CCACHE_DISABLE=1

        make -j$(nproc) \
          CC=clang \
          HOSTCC=gcc \
          HOSTCXX=g++ \
          LD=/usr/bin/ld \
          HOSTLD=/usr/bin/ld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # 📦 Upload
    - name: 📦 Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: A21s-Kernel-V2
        path: kernel/arch/arm64/boot/Image*
